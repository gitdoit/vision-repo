server:
  port: 26330
  servlet:
    context-path: /

spring:
  application:
    name: vision-admin

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:49153}/${DB_NAME:gscsfy_l3_gasdb_v1}?currentSchema=vision
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgrespw}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: vision
    default-schema: vision

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Vision 平台配置
vision:
  # 推理服务配置
  inference:
    service-url: ${INFERENCE_SERVICE_URL:http://localhost:26331}  # deprecated: 多节点模式下不再使用
    connect-timeout: 5000
    read-timeout: 30000
    image-transfer-mode: url  # url | base64
    heartbeat-timeout: 60     # 心跳超时秒数
    health-check-interval: 30 # 健康检查间隔秒数

  # 存储配置
  storage:
    type: ${VISION_STORAGE_TYPE:local}
    local:
      base-path: ${LOCAL_STORAGE_PATH:/data/vision/files}
      base-url: ${LOCAL_STORAGE_URL:http://localhost:26330/files}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:vision}

  # 抓图任务配置
  capture:
    ffmpeg-path: ${FFMPEG_PATH:ffmpeg}
    thread-pool-size: 10
    temp-dir: ${CAPTURE_TEMP_DIR:/tmp/vision-capture}

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  packages-to-scan: com.vision

# 日志配置
logging:
  level:
    com.vision: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
