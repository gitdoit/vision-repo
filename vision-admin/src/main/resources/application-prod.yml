# 生产环境配置

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}?currentSchema=vision
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

# Vision 生产环境配置
vision:
  inference:
    service-url: http://vision-inference:26331
    connect-timeout: 10000
    read-timeout: 60000

  storage:
    type: ${VISION_STORAGE_TYPE:minio}
    local:
      base-path: /data/vision/files
      base-url: ${LOCAL_STORAGE_URL}
    minio:
      endpoint: ${MINIO_ENDPOINT}
      access-key: ${MINIO_ACCESS_KEY}
      secret-key: ${MINIO_SECRET_KEY}
      bucket: ${MINIO_BUCKET:vision}

  capture:
    thread-pool-size: 20
    temp-dir: /data/vision/tmp/capture

# 日志
logging:
  level:
    com.vision: INFO
  file:
    name: /logs/vision-admin.log
    max-size: 100MB
    max-history: 30
